<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="warehouse floor plan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122033"/>
      <stop offset="100%" stop-color="#1f3958"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#6a87a9" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#grid)"/>

  <rect x="65" y="60" width="220" height="140" rx="8" fill="#304966" stroke="#98b7d8" stroke-opacity="0.7"/>
